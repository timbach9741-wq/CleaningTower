  <body class="antialiased text-gray-900 bg-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // PWA 설치 이벤트를 전역에서 미리 캡처 (React 마운트 전 발생 시 유실 방지)
      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        // 커스텀 이벤트를 발생시켜 React 앱에 알림
        window.dispatchEvent(new Event('pwa-prompt-ready'));
      });

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // ★ 통합 서비스 워커 등록 (PWA + FCM을 하나로)
          // scope: '/'로 설정하여 모든 경로에서 동작하도록 함
          navigator.serviceWorker.register('/sw.js', { scope: '/' }).then(
            (registration) => {
              console.log('[PWA] 서비스워커 등록 성공, scope:', registration.scope);
            },
            (err) => {
              console.error('[PWA] 서비스워커 등록 실패:', err);
            }
          );
        });
      }
    </script>
