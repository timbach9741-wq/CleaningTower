  <script>
    function downloadVCard() {
      var v = "BEGIN:VCARD\nVERSION:3.0\nFN:이홍석 대표 (청소타워)\nN:이;홍석;;;\nORG:청소타워\nTITLE:대표이사\nTEL;TYPE=CELL:010-2246-9509\nTEL;TYPE=WORK:031-499-9509\nEMAIL:ttimbach@naver.com\nURL:https://cheongsotower.kr\nNOTE:청소타워 전문 청소 서비스\nEND:VCARD";
      var b = new Blob([v], {type:'text/vcard;charset=utf-8'});
      var u = URL.createObjectURL(b);
      var a = document.createElement('a');
      a.href = u; a.download = '이홍석_청소타워.vcf';
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(u);
    }
  </script>
